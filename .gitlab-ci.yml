# Author: Kalidas, Janardhanan
# Updated: 2026-06-17

workflow:
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_PIPELINE_SOURCE == "web"'
    - if: '$CI_PIPELINE_SOURCE == "push" && $CI_COMMIT_BRANCH && $CI_OPEN_MERGE_REQUESTS'
      when: never
    - if: '$CI_COMMIT_BRANCH'

stages:
  - release
  - backup
  - pre_deploy_validate
  - deploy
  - post_deploy_validate

variables:
  GIT_DEPTH: "0"
  ZCLI_VERSION: "1.0.0-beta.56"
  DEPLOY_CONFIRM_REQUIRED: "DEPLOY_TO_PROD"
  ROLLBACK_CONFIRM_REQUIRED: "ROLLBACK_TO_PROD"
  EXTERNAL_VALIDATION_PROJECT: "bu-f-ps/sw-support-group/skc_pe_deployment_validation"
  EXTERNAL_VALIDATION_BRANCH: "Main"
  VALIDATION_DEPLOYMENT_TYPE_MAIN: "main_production"
  VALIDATION_DEPLOYMENT_TYPE_BRANCH: "branch_update"
  VALIDATION_DEPLOYMENT_TIMESTAMP: "$CI_PIPELINE_CREATED_AT"

default:
  tags:
    - shell
    - macos
  before_script:
    - node --version
    - npm --version
    - |
      if [[ -f package-lock.json ]]; then
        npm ci
      else
        npm install
      fi
    - |
      INSTALLED_ZCLI="$(npx zcli --version 2>/dev/null || true)"
      if [[ "$INSTALLED_ZCLI" != "$ZCLI_VERSION" ]]; then
        npm install -g "@zendesk/zcli@${ZCLI_VERSION}"
      fi
      npx zcli --version

theme_version_release:
  stage: release
  script:
    - npm run version:theme
    - echo "Version bumped. Commit and push manifest.json manually or extend this job with a deploy token."
  rules:
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
      when: manual
  allow_failure: false

theme_backup_production:
  stage: backup
  script:
    - npm run backup:theme
  artifacts:
    name: "theme-backup-${CI_COMMIT_REF_SLUG}-${CI_PIPELINE_ID}"
    when: always
    expire_in: 14 days
    paths:
      - backups/
  rules:
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
      when: manual
  allow_failure: false

theme_validate_before_deploy_main:
  stage: pre_deploy_validate
  needs:
    - theme_backup_production
  trigger:
    project: $EXTERNAL_VALIDATION_PROJECT
    branch: $EXTERNAL_VALIDATION_BRANCH
    strategy: depend
    forward:
      pipeline_variables: true
  variables:
    VALIDATION_PHASE: "pre_deploy"
    VALIDATION_SOURCE: "theme_deploy"
    VALIDATION_DEPLOYMENT_TYPE: "$VALIDATION_DEPLOYMENT_TYPE_MAIN"
    VALIDATION_ENVIRONMENT: "production"
    VALIDATION_GATE_MODE: "hard"
    TEST_BASE_URL: "$ZD_PROD_BASE_URL"
    TARGET_NAME: "production"
    VALIDATION_REF_NAME: "$CI_COMMIT_REF_NAME"
    VALIDATION_COMMIT_SHA: "$CI_COMMIT_SHA"
    DEPLOYMENT_TIMESTAMP: "$VALIDATION_DEPLOYMENT_TIMESTAMP"
  rules:
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
      when: on_success
  allow_failure: false

theme_validate_before_deploy_branch:
  stage: pre_deploy_validate
  trigger:
    project: $EXTERNAL_VALIDATION_PROJECT
    branch: $EXTERNAL_VALIDATION_BRANCH
    strategy: depend
    forward:
      pipeline_variables: true
  variables:
    VALIDATION_PHASE: "pre_deploy"
    VALIDATION_SOURCE: "theme_deploy"
    VALIDATION_DEPLOYMENT_TYPE: "$VALIDATION_DEPLOYMENT_TYPE_BRANCH"
    VALIDATION_ENVIRONMENT: "preview"
    VALIDATION_GATE_MODE: "soft"
    TEST_BASE_URL: "$ZD_PREVIEW_BASE_URL"
    TARGET_NAME: "preview"
    VALIDATION_REF_NAME: "$CI_COMMIT_REF_NAME"
    VALIDATION_COMMIT_SHA: "$CI_COMMIT_SHA"
    DEPLOYMENT_TIMESTAMP: "$VALIDATION_DEPLOYMENT_TIMESTAMP"
  rules:
    - if: '$CI_COMMIT_BRANCH != $CI_DEFAULT_BRANCH'
      when: on_success
  allow_failure: false

theme_deploy_production:
  stage: deploy
  needs:
    - theme_validate_before_deploy_main
  resource_group: production
  script:
    - |
      required=("ZD_SUBDOMAIN" "ZD_EMAIL" "ZD_API_TOKEN")
      for name in "${required[@]}"; do
        if [[ -z "${!name:-}" ]]; then
          echo "Deploy blocked: missing required variable '$name'"
          exit 1
        fi
      done
      if [[ "${DEPLOY_CONFIRM:-}" != "${DEPLOY_CONFIRM_REQUIRED}" ]]; then
        echo "Deploy blocked: DEPLOY_CONFIRM must equal '${DEPLOY_CONFIRM_REQUIRED}'"
        exit 1
      fi
    - npm run deploy:theme
  rules:
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
      when: manual
  allow_failure: false

theme_deploy_branch:
  stage: deploy
  needs:
    - theme_validate_before_deploy_branch
  script:
    - |
      required=("ZD_SUBDOMAIN" "ZD_EMAIL" "ZD_API_TOKEN")
      for name in "${required[@]}"; do
        if [[ -z "${!name:-}" ]]; then
          echo "Branch deploy blocked: missing required variable '$name'"
          exit 1
        fi
      done
      if [[ "${DEPLOY_CONFIRM_BRANCH:-}" != "DEPLOY_TO_BRANCH" ]]; then
        echo "Branch deploy blocked: set DEPLOY_CONFIRM_BRANCH=DEPLOY_TO_BRANCH"
        exit 1
      fi
    - npm run deploy:theme
  rules:
    - if: '$CI_COMMIT_BRANCH != $CI_DEFAULT_BRANCH'
      when: manual
  allow_failure: false

theme_rollback_production:
  stage: deploy
  needs:
    - theme_backup_production
  resource_group: production
  script:
    - |
      required=("ZD_SUBDOMAIN" "ZD_EMAIL" "ZD_API_TOKEN")
      for name in "${required[@]}"; do
        if [[ -z "${!name:-}" ]]; then
          echo "Rollback blocked: missing required variable '$name'"
          exit 1
        fi
      done
      if [[ "${ROLLBACK_CONFIRM:-}" != "${ROLLBACK_CONFIRM_REQUIRED}" ]]; then
        echo "Rollback blocked: ROLLBACK_CONFIRM must equal '${ROLLBACK_CONFIRM_REQUIRED}'"
        exit 1
      fi
    - npm run rollback:theme
  rules:
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
      when: manual
  allow_failure: false

theme_validate_after_deploy_main:
  stage: post_deploy_validate
  needs:
    - theme_deploy_production
  trigger:
    project: $EXTERNAL_VALIDATION_PROJECT
    branch: $EXTERNAL_VALIDATION_BRANCH
    strategy: depend
    forward:
      pipeline_variables: true
  variables:
    VALIDATION_PHASE: "post_deploy"
    VALIDATION_SOURCE: "theme_deploy"
    VALIDATION_DEPLOYMENT_TYPE: "$VALIDATION_DEPLOYMENT_TYPE_MAIN"
    VALIDATION_ENVIRONMENT: "production"
    VALIDATION_GATE_MODE: "hard"
    TEST_BASE_URL: "$ZD_PROD_BASE_URL"
    TARGET_NAME: "production"
    VALIDATION_REF_NAME: "$CI_COMMIT_REF_NAME"
    VALIDATION_COMMIT_SHA: "$CI_COMMIT_SHA"
    DEPLOYMENT_TIMESTAMP: "$VALIDATION_DEPLOYMENT_TIMESTAMP"
  rules:
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
  allow_failure: false

theme_validate_after_deploy_branch:
  stage: post_deploy_validate
  needs:
    - theme_deploy_branch
  trigger:
    project: $EXTERNAL_VALIDATION_PROJECT
    branch: $EXTERNAL_VALIDATION_BRANCH
    strategy: depend
    forward:
      pipeline_variables: true
  variables:
    VALIDATION_PHASE: "post_deploy"
    VALIDATION_SOURCE: "theme_deploy"
    VALIDATION_DEPLOYMENT_TYPE: "$VALIDATION_DEPLOYMENT_TYPE_BRANCH"
    VALIDATION_ENVIRONMENT: "preview"
    VALIDATION_GATE_MODE: "soft"
    TEST_BASE_URL: "$ZD_PREVIEW_BASE_URL"
    TARGET_NAME: "preview"
    VALIDATION_REF_NAME: "$CI_COMMIT_REF_NAME"
    VALIDATION_COMMIT_SHA: "$CI_COMMIT_SHA"
    DEPLOYMENT_TIMESTAMP: "$VALIDATION_DEPLOYMENT_TIMESTAMP"
  rules:
    - if: '$CI_COMMIT_BRANCH != $CI_DEFAULT_BRANCH'
  allow_failure: false

theme_validate_after_rollback:
  stage: post_deploy_validate
  needs:
    - theme_rollback_production
  trigger:
    project: $EXTERNAL_VALIDATION_PROJECT
    branch: $EXTERNAL_VALIDATION_BRANCH
    strategy: depend
    forward:
      pipeline_variables: true
  variables:
    VALIDATION_PHASE: "post_deploy"
    VALIDATION_SOURCE: "theme_rollback"
    VALIDATION_DEPLOYMENT_TYPE: "main_production"
    VALIDATION_ENVIRONMENT: "production"
    VALIDATION_GATE_MODE: "hard"
    TEST_BASE_URL: "$ZD_PROD_BASE_URL"
    TARGET_NAME: "production"
    VALIDATION_REF_NAME: "$CI_COMMIT_REF_NAME"
    VALIDATION_COMMIT_SHA: "$CI_COMMIT_SHA"
    DEPLOYMENT_TIMESTAMP: "$VALIDATION_DEPLOYMENT_TIMESTAMP"
  rules:
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
  allow_failure: false
