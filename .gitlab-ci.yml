# Author: Kalidas, Janardhanan
# Updated: 2026-06-29

workflow:
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_PIPELINE_SOURCE == "web"'
    - if: '$CI_PIPELINE_SOURCE == "push" && $CI_COMMIT_BRANCH && $CI_OPEN_MERGE_REQUESTS'
      when: never
    - if: '$CI_COMMIT_BRANCH'

stages:
  - release
  - backup
  - deploy

variables:
  GIT_DEPTH: "0"
  ZCLI_VERSION: "1.0.0-beta.56"
  DEPLOY_CONFIRM_REQUIRED: "DEPLOY_TO_PROD"
  ROLLBACK_CONFIRM_REQUIRED: "ROLLBACK_TO_PROD"

default:
  tags:
    - shell
    - macos
  before_script:
    - node --version
    - npm --version
    - |
      if [[ -f package-lock.json ]]; then
        npm ci
      else
        npm install
      fi
    - |
      INSTALLED_ZCLI="$(npx zcli --version 2>/dev/null || true)"
      if [[ "$INSTALLED_ZCLI" != "$ZCLI_VERSION" ]]; then
        npm install -g "@zendesk/zcli@${ZCLI_VERSION}"
      fi
      npx zcli --version

.required_vars_check_cmd: &required_vars_check_cmd |
  required=("ZD_SUBDOMAIN" "ZD_EMAIL" "ZD_API_TOKEN")
  for name in "${required[@]}"; do
    if [[ -z "${!name:-}" ]]; then
      echo "Blocked: missing required variable '$name'"
      exit 1
    fi
  done

.production_deploy_confirm_check_cmd: &production_deploy_confirm_check_cmd |
  if [[ "${DEPLOY_CONFIRM:-}" != "${DEPLOY_CONFIRM_REQUIRED}" ]]; then
    echo "Deploy blocked: DEPLOY_CONFIRM must equal '${DEPLOY_CONFIRM_REQUIRED}'"
    exit 1
  fi

.branch_deploy_confirm_check_cmd: &branch_deploy_confirm_check_cmd |
  if [[ "${DEPLOY_CONFIRM_BRANCH:-}" != "DEPLOY_TO_BRANCH" ]]; then
    echo "Branch deploy blocked: set DEPLOY_CONFIRM_BRANCH=DEPLOY_TO_BRANCH"
    exit 1
  fi

.rollback_confirm_check_cmd: &rollback_confirm_check_cmd |
  if [[ "${ROLLBACK_CONFIRM:-}" != "${ROLLBACK_CONFIRM_REQUIRED}" ]]; then
    echo "Rollback blocked: ROLLBACK_CONFIRM must equal '${ROLLBACK_CONFIRM_REQUIRED}'"
    exit 1
  fi

theme_version_release:
  stage: release
  script:
    - npm run version:theme
    - echo "Version bumped. Commit and push manifest.json manually or extend this job with a deploy token."
  rules:
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
      when: manual
  allow_failure: false

theme_backup_production:
  stage: backup
  script:
    - npm run backup:theme
  artifacts:
    name: "theme-backup-${CI_COMMIT_REF_SLUG}-${CI_PIPELINE_ID}"
    when: always
    expire_in: 14 days
    paths:
      - backups/
  rules:
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
      when: manual
  allow_failure: false

theme_deploy_production:
  stage: deploy
  environment:
    name: production
  needs:
    - theme_backup_production
  resource_group: production
  script:
    - *required_vars_check_cmd
    - *production_deploy_confirm_check_cmd
    - npm run deploy:theme
  rules:
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
      when: manual
  allow_failure: false

theme_deploy_branch:
  stage: deploy
  environment:
    name: preview/$CI_COMMIT_REF_SLUG
  script:
    - *required_vars_check_cmd
    - *branch_deploy_confirm_check_cmd
    - npm run deploy:theme
  rules:
    - if: '$CI_PIPELINE_SOURCE == "trigger" && $CI_COMMIT_BRANCH != $CI_DEFAULT_BRANCH'
      when: on_success
    - if: '$CI_COMMIT_BRANCH != $CI_DEFAULT_BRANCH'
      when: manual
  allow_failure: false

theme_rollback_production:
  stage: deploy
  environment:
    name: production
  needs:
    - theme_backup_production
  resource_group: production
  script:
    - *required_vars_check_cmd
    - *rollback_confirm_check_cmd
    - npm run rollback:theme
  rules:
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
      when: manual
  allow_failure: false
